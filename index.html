<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>W2 — Verifica Funzionale</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0c0c0e;--s1:#161618;--s2:#1e1e21;--s3:#26262a;
  --border:#2a2a2f;--border2:#333338;
  --acc:#4f7fff;--acc2:#5ef08a;--warn:#f0a05e;--danger:#f05e5e;
  --gold:#b8965a;
  --text:#ececec;--text2:#888;--text3:#444;
  --r:14px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden;}
.app{display:flex;flex-direction:column;height:100vh;}
.topbar{flex-shrink:0;background:rgba(12,12,14,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.topbar-back{width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.topbar-back.show{display:flex;}
.topbar-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.topbar-logo img{height:30px;width:auto;}
.topbar-center{flex:1;min-width:0;}
.topbar-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.breadcrumb{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;}
.bc-item{cursor:pointer;color:var(--text3);transition:color 0.15s;flex-shrink:0;}
.bc-item:hover{color:var(--acc);}
.bc-item.active{color:var(--text2);cursor:default;}
.bc-sep{color:var(--text3);font-size:10px;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:background 0.3s;}
.sync-dot.ok{background:var(--acc2);}
.sync-dot.busy{background:var(--warn);animation:pulse 1s infinite;}
.sync-dot.err{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.t-chip{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:5px 10px 5px 6px;cursor:pointer;font-size:12px;color:var(--text2);}
.t-av{width:24px;height:24px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0;}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:16px;max-width:680px;margin:0 auto;}
.page.active{display:block;}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;text-align:center;padding:20px;}
.login-logo{margin-bottom:20px;}
.login-logo img{width:130px;height:auto;}
.login-title{font-size:20px;font-weight:600;margin-bottom:4px;color:var(--gold);}
.login-sub{color:var(--text2);font-size:12px;margin-bottom:28px;}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:13px;height:13px;border-radius:50%;background:var(--s3);border:1px solid var(--border2);transition:all 0.2s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;width:100%;}
.pin-btn{background:var(--s1);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:16px;font-size:22px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all 0.12s;}
.pin-btn:active{background:var(--s2);border-color:var(--gold);transform:scale(0.95);}
.pin-error{color:var(--danger);font-size:12px;margin-top:8px;min-height:18px;}

/* TECNICO */
.welcome{text-align:center;padding:24px 0 14px;}
.welcome h1{font-size:20px;font-weight:600;margin-bottom:4px;}
.welcome p{color:var(--text2);font-size:12px;}
.tecnici-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.tc-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 12px;cursor:pointer;transition:all 0.15s;text-align:center;}
.tc-card:active{border-color:var(--gold);transform:scale(0.97);}
.tc-av{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;background:var(--s3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--gold);}
.tc-name{font-size:13px;font-weight:500;}

/* UPLOAD */
.sl{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;margin-top:16px;}
.sl:first-child{margin-top:4px;}
.drive-btn{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:12px 16px;font-size:13px;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:10px;margin-top:8px;transition:all 0.15s;}
.drive-btn:active{border-color:var(--acc2);}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:32px 20px;text-align:center;cursor:pointer;background:var(--s1);margin-top:8px;}
#fileInput{display:none;}
.demo-link{display:block;text-align:center;margin-top:8px;color:var(--text3);font-size:12px;cursor:pointer;padding:8px;}

/* LIST */
.card-list{display:flex;flex-direction:column;gap:6px;padding-bottom:20px;}
.search-wrap{position:relative;margin-bottom:10px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.search-input{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);border-radius:11px;padding:10px 14px 10px 36px;font-size:14px;font-family:var(--sans);outline:none;}
.search-input:focus{border-color:var(--acc);}
.cli-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;}
.cli-card:active{border-color:var(--acc);}
.cc-name{font-size:14px;font-weight:500;}
.cc-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.badge{background:var(--s3);border-radius:20px;padding:2px 9px;font-size:10px;font-family:var(--mono);color:var(--text2);}

/* STRUMENTI */
.rep-hdr{display:flex;align-items:center;gap:7px;padding:4px 0;margin-bottom:6px;margin-top:16px;border-bottom:1px solid var(--border);}
.rep-hdr:first-of-type{margin-top:4px;}
.rep-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);flex-shrink:0;}
.rep-name{font-family:var(--mono);font-size:9px;color:var(--acc);letter-spacing:1.5px;text-transform:uppercase;flex:1;}
.rep-cnt{font-family:var(--mono);font-size:9px;color:var(--text3);}
.str-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px;cursor:pointer;transition:all 0.12s;margin-bottom:5px;display:flex;align-items:center;gap:10px;}
.str-card:active{transform:scale(0.985);border-color:var(--acc2);}
.str-card.done{border-color:rgba(94,240,138,0.25);opacity:0.6;}
.str-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.str-icon.endo{background:rgba(79,127,255,0.12);}
.str-icon.tv{background:rgba(240,160,94,0.12);}
.str-icon.iv{background:rgba(94,240,138,0.08);}
.str-body{flex:1;min-width:0;}
.str-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.str-meta{font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.add-str-btn{width:100%;background:transparent;border:1px dashed var(--border2);color:var(--text2);border-radius:10px;padding:11px;font-size:12px;cursor:pointer;font-family:var(--sans);display:flex;align-items:center;gap:10px;margin-top:8px;transition:all 0.15s;}
.add-str-btn:active{border-color:var(--acc2);color:var(--acc2);}
.pb80{height:80px;}

/* WIZARD */
.wz-prog{display:flex;gap:3px;margin-bottom:20px;}
.wz-d{height:3px;border-radius:2px;flex:1;background:var(--border);transition:background 0.3s;}
.wz-d.done{background:var(--acc2);}
.wz-d.active{background:var(--acc);}
.wz-step{animation:fs 0.15s ease;}
@keyframes fs{from{opacity:0;transform:translateX(12px);}to{opacity:1;transform:translateX(0);}}
.step-eye{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1.5px;margin-bottom:4px;}
.step-title{font-size:19px;font-weight:600;margin-bottom:4px;}
.step-hint{font-size:12px;color:var(--text2);margin-bottom:16px;}

/* MODULO CHOICE */
.mc-grid{display:flex;flex-direction:column;gap:8px;}
.mc{background:var(--s1);border:2px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:12px;}
.mc.sel{border-color:var(--acc);background:rgba(79,127,255,0.08);}
.mc.suggested{border-color:var(--acc2);}
.mc-icon{font-size:22px;}
.mc-label{font-size:14px;font-weight:500;}
.mc-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.mc-badge{margin-left:auto;font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:10px;background:rgba(94,240,138,0.1);color:var(--acc2);border:1px solid rgba(94,240,138,0.2);white-space:nowrap;}
.mc-chk{margin-left:auto;font-size:18px;opacity:0;transition:opacity 0.15s;}
.mc.sel .mc-chk{opacity:1;}

/* FORM */
.fg{margin-bottom:11px;}
.fl{font-size:10px;color:var(--text2);font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.fi{width:100%;background:var(--s1);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:11px 12px;font-size:14px;font-family:var(--sans);outline:none;transition:border-color 0.2s;}
.fi:focus{border-color:var(--acc);}
.fi.pre{border-color:rgba(94,240,138,0.3);color:var(--acc2);}

/* CHECKLIST */
.cl-hdr{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.cl-hdr-l{font-size:11px;color:var(--text2);}
.cl-hdr-v{font-family:var(--mono);font-size:11px;color:var(--acc2);}
.cl-item{background:var(--s1);border:1px solid var(--border);border-radius:9px;margin-bottom:5px;overflow:hidden;}
.cl-item.anom{border-color:var(--warn);}
.cl-row{display:flex;align-items:center;gap:8px;padding:10px 11px;}
.cl-lbl{flex:1;font-size:12px;line-height:1.4;}
.cl-pills{display:flex;gap:4px;flex-shrink:0;}
.pill{padding:5px 9px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--border);cursor:pointer;font-family:var(--mono);color:var(--text3);background:var(--s2);transition:all 0.12s;white-space:nowrap;user-select:none;}
.pill.pos.on{background:rgba(94,240,138,0.12);border-color:var(--acc2);color:var(--acc2);}
.pill.na.on{background:rgba(136,136,136,0.1);border-color:#555;color:#888;}
.pill.warn.on{background:rgba(240,160,94,0.12);border-color:var(--warn);color:var(--warn);}
.cl-note-btn{font-size:14px;cursor:pointer;color:var(--text3);padding:3px;flex-shrink:0;}
.cl-note{display:none;padding:0 11px 8px;}
.cl-note.open{display:block;}
.cl-note textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:7px 9px;font-size:12px;font-family:var(--sans);resize:none;outline:none;min-height:52px;}

/* MISURAZIONI */
.mis-strumento{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:12px;}
.mis-strumento-title{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.mis-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.mis-table-wrap{overflow-x:auto;margin-bottom:12px;}
.mis-table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px;}
.mis-table th{background:var(--s2);color:var(--text2);padding:7px 8px;text-align:left;font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;border:1px solid var(--border);}
.mis-table td{padding:5px 7px;border:1px solid var(--border);background:var(--s1);}
.mis-table input,.mis-table select{width:100%;background:transparent;border:none;color:var(--text);font-size:12px;font-family:var(--sans);outline:none;padding:1px;}
.mis-table select option{background:var(--s2);}
.mis-table tr:nth-child(even) td{background:var(--s2);}
.mis-table td.fixed{color:var(--text2);font-size:11px;}
.mis-table td.esito-pos{color:var(--acc2);}
.mis-table td.esito-neg{color:var(--danger);}
.mis-extra{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.mis-section-title{font-family:var(--mono);font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:14px 0 7px;}
.mt{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);font-weight:500;margin-bottom:14px;}
.mt-endo{background:rgba(79,127,255,0.12);color:var(--acc);border:1px solid rgba(79,127,255,0.25);}
.mt-tv{background:rgba(240,160,94,0.12);color:var(--warn);border:1px solid rgba(240,160,94,0.25);}
.mt-iv{background:rgba(94,240,138,0.08);color:var(--acc2);border:1px solid rgba(94,240,138,0.15);}

.next-btn{width:100%;background:var(--acc);border:none;color:white;border-radius:11px;padding:15px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-top:16px;transition:opacity 0.15s;}
.next-btn:active{opacity:0.8;}
.next-btn.saving{background:var(--s2);color:var(--text2);pointer-events:none;}
.firma-wrap{position:relative;}
.firma-c{width:100%;height:115px;background:var(--s1);border:1px solid var(--border);border-radius:9px;cursor:crosshair;touch-action:none;display:block;}
.firma-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:4px;}
.firma-clr{position:absolute;top:6px;right:6px;background:var(--s2);border:1px solid var(--border);color:var(--text2);border-radius:7px;padding:4px 8px;font-size:11px;cursor:pointer;}
.queue-banner{background:rgba(240,160,94,0.1);border:1px solid rgba(240,160,94,0.2);border-radius:9px;padding:10px 12px;margin-bottom:12px;display:none;align-items:center;gap:8px;font-size:12px;}
.queue-banner.show{display:flex;}
.queue-sync-btn{background:var(--warn);color:white;border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-left:auto;}
.divider{height:1px;background:var(--border);margin:14px 0;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border2);color:var(--text);padding:10px 18px;border-radius:20px;font-size:12px;opacity:0;transition:opacity 0.25s;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
.toast.show{opacity:1;}
.empty{text-align:center;padding:48px 20px;}
.empty-icon{font-size:38px;margin-bottom:8px;}
.empty-text{color:var(--text2);font-size:13px;}
</style>
</head>

// ══════════════════════════════
// SA TOKEN
// ══════════════════════════════
async function getSAToken(){
  if(saToken&&Date.now()<saTokenExp-60000)return saToken;
  const now=Math.floor(Date.now()/1000);
  const hdr={alg:'RS256',typ:'JWT'};
  const pay={iss:SA.email,scope:'https://www.googleapis.com/auth/drive',aud:'https://oauth2.googleapis.com/token',exp:now+3600,iat:now};
  const b64=s=>btoa(unescape(encodeURIComponent(JSON.stringify(s)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const si=b64(hdr)+'.'+b64(pay);
  const pem=SA.key.replace(/-----BEGIN PRIVATE KEY-----|-----END PRIVATE KEY-----|\n/g,'');
  const der=Uint8Array.from(atob(pem),c=>c.charCodeAt(0));
  const ck=await crypto.subtle.importKey('pkcs8',der.buffer,{name:'RSASSA-PKCS1-v1_5',hash:'SHA-256'},false,['sign']);
  const sig=await crypto.subtle.sign('RSASSA-PKCS1-v1_5',ck,new TextEncoder().encode(si));
  const sb=btoa(String.fromCharCode(...new Uint8Array(sig))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const jwt=si+'.'+sb;
  const res=await fetch('https://oauth2.googleapis.com/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:`grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`});
  const d=await res.json();
  if(!d.access_token)throw new Error(JSON.stringify(d));
  saToken=d.access_token;saTokenExp=Date.now()+(d.expires_in*1000);
  return saToken;
}

function showPage(id,push=true){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  document.getElementById('mainContent').scrollTop=0;
  if(push)pageStack.push(id);

function goBack(){
  if(pageStack.length>1){
    pageStack.pop();const prev=pageStack[pageStack.length-1];
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(prev).classList.add('active');
    document.getElementById('mainContent').scrollTop=0;
    document.getElementById('backBtn').classList.toggle('show',pageStack.length>1&&!['pg-login','pg-tecnico'].includes(prev));

  }

function updBC(id){
  const bc=document.getElementById('breadcrumb');
  const items=[];
  if(['pg-clienti','pg-strumenti','pg-wizard'].includes(id))items.push({l:'Clienti',p:'pg-clienti'});
  if(['pg-strumenti','pg-wizard'].includes(id)&&currentCliente)items.push({l:currentCliente,p:'pg-strumenti'});
  if(id==='pg-wizard'&&wzData.descrizione)items.push({l:wzData.descrizione,p:null});

  bc.innerHTML=items.map((it,i)=>(i>0?'<span class="bc-sep">›</span>':'')+
    `<span class="bc-item ${i===items.length-1?'active':''}" ${it.p?`onclick="bcNav('${it.p}')"`:''}>${it.l}</span>`).join('');
}
function bcNav(id){
  while(pageStack.length&&pageStack[pageStack.length-1]!==id)pageStack.pop();
  if(!pageStack.includes(id))pageStack.push(id);
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('mainContent').scrollTop=0;
  document.getElementById('backBtn').classList.toggle('show',pageStack.length>1);
  updBC(id);
}

async function loadFromDrive(){
  if(!navigator.onLine){toast('⚠️ Offline');return;}
  toast('📁 Connessione Drive...');document.getElementById('syncDot').className='sync-dot busy';
  try{
    const tok=await getSAToken();
    const res=await fetch(`https://www.googleapis.com/drive/v3/files?q='${DRIVE.FOLDER_INVENTARIO}'+in+parents+and+trashed=false&fields=files(id,name)`,{headers:{Authorization:`Bearer ${tok}`}});
    const data=await res.json();
    if(!data.files?.length){toast('⚠️ Nessun file in Inventario');return;}
    const f=data.files.find(x=>x.name.endsWith('.xlsx')||x.name.endsWith('.xls'))||data.files[0];
    const fr=await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,{headers:{Authorization:`Bearer ${tok}`}});
    const ab=await(await fr.blob()).arrayBuffer();
    const wb=XLSX.read(ab,{type:'array'});
    processRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}),true,f.name);
    document.getElementById('syncDot').className='sync-dot ok';
  }catch(e){toast('❌ '+e.message);document.getElementById('syncDot').className='sync-dot err';console.error(e);}
}
function loadExcel(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'binary'});processRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''}),true,file.name);}catch(err){toast('❌ '+err.message);}};
  r.readAsBinaryString(file);
}
function fc(row,keys){
  const rk=Object.keys(row);
  for(const k of keys){const f=rk.find(r=>r.toLowerCase().replace(/[\s\.\-_\/]/g,'').includes(k.toLowerCase().replace(/[\s\.\-_\/]/g,'')));if(f!==undefined)return String(row[f]||'').trim();}
  return'';
}
function processRows(rows,cache=false,nome=''){
  if(!rows.length){toast('File vuoto');return;}
  const cli=nome.replace(/\.(xlsx|xls)$/i,'').trim()||'Cliente';
  allData=rows.map(r=>({
    cliente:cli,reparto:fc(r,['reparto']),
    descrizione:fc(r,['tipologia','descrizione','apparecchio','strumento','tipo']),
    marca:fc(r,['marca','brand','produttore']),modello:fc(r,['modello','model']),
    matricola:fc(r,['n.serie','nserie','serie','sn','s/n','serial','matricola']),
    inventario:fc(r,['n.inv','ninv','inventario','inv','rif.interno']),
    esito_vf:fc(r,['esitovf','esito vf','esito']),_raw:r
  })).filter(r=>r.descrizione);
  if(cache)localStorage.setItem('wv2_inventario',JSON.stringify(allData));
  clienti=[...new Set(allData.map(r=>r.cliente).filter(Boolean))].sort();
  showPage('pg-clienti');renderCli(clienti);
  if(cache)toast(`✓ ${allData.length} strumenti da ${cli}`);
}

function getTipo(d){
  const s=(d||'').toUpperCase();
  if(s.includes('VIDEOPROCESSORE')||s.includes('EPK'))return'tv';
  if(s.includes('FIBRONASOLARING')||(s.includes('FIBRO')&&s.includes('NASO')))return'fibro_naso';
  if(s.includes('FIBROBRONCO')||(s.includes('FIBRO')&&s.includes('BRONCO')))return'fibro_bronco';
  if(s.includes('FIBRO'))return'endo';
  if(s.includes('DUODEN'))return'endo_duoden';
  if(s.includes('NASO')&&s.includes('LARING'))return'endo_naso';
  if(s.includes('VIDEO')&&(s.includes('GASTRO')||s.includes('COLON')||s.includes('LARING')||s.includes('BRONCO')))return'endo';
  if(s.includes('ELETTROCARDIOG')||s.includes(' ECG'))return'ecg';
  if(s.includes('BILANCIA'))return'bilancia';
  if(s.includes('DEFIBRILLATORE')||s.includes('DAE'))return'iv';
  if(s.includes('MULTIPARAMETRICO'))return'iv';
  if(s.includes('PULSOSSIMETRO'))return'iv';
  if(s.includes('FRIGORIF')||s.includes('CONGELAT')||s.includes('INCUBAT')||s.includes('TEMPERATURA'))return'iv';
  if(s.includes('ELETTROBISTURI')||s.includes('BISTURI')||s.includes('DIATERMOCOAG')||s.includes('GENERATORE CHIRURGICO')||s.includes('GENERATORE BIPOLARE'))return'iv';
  return'iv';
}

function wzSaveDati(){

function setE(i,v,el){
  wzData.checklist[i].esito=v;el.closest('.cl-pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));el.classList.add('on');
  document.getElementById('cli_'+i).classList.toggle('anom',v==='ANOMALIA');

}
function togN(i){document.getElementById('cln_'+i).classList.toggle('open');}

function initFirma(){
  const c=document.getElementById('firmaC');if(!c)return;
  c.width=c.offsetWidth*window.devicePixelRatio;c.height=c.offsetHeight*window.devicePixelRatio;
  firmaCtx=c.getContext('2d');firmaCtx.scale(window.devicePixelRatio,window.devicePixelRatio);
  firmaCtx.strokeStyle='#1a3aaa';firmaCtx.lineWidth=2.5;firmaCtx.lineCap='round';firmaCtx.lineJoin='round';
  firmaCanvas=c;
  const pos=(e,c)=>{const r=c.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return[s.clientX-r.left,s.clientY-r.top];};
  c.addEventListener('mousedown',e=>{firmaDrawing=true;firmaLast=pos(e,c);});
  c.addEventListener('mousemove',e=>{if(!firmaDrawing)return;const p=pos(e,c);firmaCtx.beginPath();firmaCtx.moveTo(firmaLast[0],firmaLast[1]);firmaCtx.lineTo(p[0],p[1]);firmaCtx.stroke();firmaLast=p;});
  c.addEventListener('mouseup',()=>firmaDrawing=false);
  c.addEventListener('touchstart',e=>{e.preventDefault();firmaDrawing=true;firmaLast=pos(e,c);},{passive:false});
  c.addEventListener('touchmove',e=>{e.preventDefault();if(!firmaDrawing)return;const p=pos(e,c);firmaCtx.beginPath();firmaCtx.moveTo(firmaLast[0],firmaLast[1]);firmaCtx.lineTo(p[0],p[1]);firmaCtx.stroke();firmaLast=p;},{passive:false});
  c.addEventListener('touchend',()=>firmaDrawing=false);
}
function clrFirma(){if(firmaCanvas&&firmaCtx)firmaCtx.clearRect(0,0,firmaCanvas.offsetWidth,firmaCanvas.offsetHeight);}

async function doSave(){
  const btn=document.getElementById('saveBtn');
  btn.textContent='⏳ Salvataggio...';btn.classList.add('saving');
  wzData.firmaDataURL=firmaCanvas?firmaCanvas.toDataURL('image/png'):null;

  let pdfBlob;
  try{pdfBlob=buildPDF();}
  catch(e){toast('❌ Errore PDF: '+e.message);btn.textContent='💾 Salva';btn.classList.remove('saving');return;}

  // Verifica che il blob sia valido
  if(!pdfBlob||pdfBlob.size<1000){toast('❌ PDF generato non valido');btn.textContent='💾 Salva';btn.classList.remove('saving');return;}

  const inv=(wzData.inventario||'SENZA_INV').replace(/[\/\s]/g,'_');
  const anno=(wzData.data||'').split('/')[2]||new Date().getFullYear();
  const filename=`${inv}_VF_${anno}_${getFileTitolo(wzData.mk)}.pdf`;

  if(navigator.onLine){
    try{
      document.getElementById('syncDot').className='sync-dot busy';
      await uploadDrive(pdfBlob,filename,wzData.cliente);
      toast('✅ Salvato su Drive!');
    }catch(e){
      console.error('Upload error:',e);
      addQueue(pdfBlob,filename,wzData.cliente);
      toast('⚠️ Errore upload — in coda locale');
    }
  }else{
    addQueue(pdfBlob,filename,wzData.cliente);
    toast('📥 Offline — in coda');
  }

  if(wzData._srcIdx>=0)allData[wzData._srcIdx].esito_vf='POSITIVO';
  if(wzData._nuovo)localStorage.setItem('wv2_inventario',JSON.stringify(allData));
  setTimeout(goToStr,700);
}

function goToStr(){
  renderStr(allData.filter(r=>r.cliente===currentCliente));
  while(pageStack.length&&pageStack[pageStack.length-1]!=='pg-strumenti')pageStack.pop();
  if(!pageStack.includes('pg-strumenti'))pageStack.push('pg-strumenti');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('pg-strumenti').classList.add('active');
  document.getElementById('mainContent').scrollTop=0;
  document.getElementById('backBtn').classList.add('show');
  updBC('pg-strumenti');
}

// DRIVE UPLOAD
// ══════════════════════════════
async function uploadDrive(blob,filename,cliente){
  const tok=await getSAToken();
  const today=fmtDate(new Date()).replace(/\//g,'-');
  const cliId=await getOrCreate(cliente,DRIVE.FOLDER_REPORT,tok);
  const dayId=await getOrCreate(today,cliId,tok);
  // Crea file
  const mr=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({name:filename,parents:[dayId],mimeType:'application/pdf'})});
  if(!mr.ok){const t=await mr.text();throw new Error('Meta fail: '+t);}
  const fid=(await mr.json()).id;
  // Upload contenuto
  const arr=await blob.arrayBuffer();
  const ur=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media`,{method:'PATCH',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/pdf','Content-Length':arr.byteLength},body:arr});
  if(!ur.ok){const t=await ur.text();throw new Error('Upload fail: '+t);}
  document.getElementById('syncDot').className='sync-dot ok';
}

async function getOrCreate(name,parentId,tok){
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${name.replace(/'/g,"\\'")}'+and+'${parentId}'+in+parents+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id)`,{headers:{Authorization:`Bearer ${tok}`}});
  const d=await r.json();if(d.files?.length)return d.files[0].id;
  const cr=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:`Bearer ${tok}`,'Content-Type':'application/json'},body:JSON.stringify({name,mimeType:'application/vnd.google-apps.folder',parents:[parentId]})});
  return(await cr.json()).id;
}

function addQueue(blob,filename,cliente){
  const r=new FileReader();
  r.onload=()=>{offlineQueue.push({dataURL:r.result,filename,cliente,ts:Date.now()});localStorage.setItem('wv2_queue',JSON.stringify(offlineQueue));updateQBanner();};
  r.readAsDataURL(blob);
}
async function syncQueue(){
  if(!navigator.onLine||!offlineQueue.length)return;
  toast(`📤 Sync ${offlineQueue.length}...`);document.getElementById('syncDot').className='sync-dot busy';
  const rem=[];
  for(const item of offlineQueue){
    try{const r=await fetch(item.dataURL);await uploadDrive(await r.blob(),item.filename,item.cliente);}
    catch(e){rem.push(item);}
  }
  offlineQueue=rem;localStorage.setItem('wv2_queue',JSON.stringify(offlineQueue));updateQBanner();
  toast(rem.length?`⚠️ ${rem.length} non sync`:'✅ Tutti sync');
  document.getElementById('syncDot').className='sync-dot ok';
}
function updateQBanner(){const b=document.getElementById('qBanner'),c=document.getElementById('qCount');offlineQueue.length?(b.classList.add('show'),c.textContent=offlineQueue.length):b.classList.remove('show');}

      doc.setFillColor(248,250,255);doc.rect(10,y,190,8,'F');doc.setDrawColor(210,218,240);doc.rect(10,y,190,8,'S');
      doc.setFont('helvetica','bold');doc.setFontSize(6);doc.setTextColor(35,70,180);
      [['MAX',14],['MIN',60],['MEDIA ERRORE',105],['VARIANZA ERRORE',155]].forEach(([h,x])=>doc.text(h,x,y+2.5));
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(0,0,0);
      [[mis.extra.max||'—',14],[mis.extra.min||'—',60],[mis.extra.media||'—',105],[mis.extra.varianza||'—',155]].forEach(([v,x])=>doc.text(v,x,y+6.5));
      y+=10;
    }
    y+=3;
  }

  // Checklist
  doc.setFillColor(35,70,180);doc.rect(10,y,190,6.5,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(6.5);
  doc.text('MODULO',14,y+4.5);doc.text('DESCRIZIONE VERIFICA',58,y+4.5);doc.text('ESITO',193,y+4.5,{align:'right'});y+=6.5;
  const mLbl={endo:'ENDOSCOPIA FLESSIBILE',tv:'VIDEOPROCESSORE',ecg:'ECG',bilancia:'BILANCIA',iv:'ISPEZIONE VISIVA'}[d.mk]||'ISPEZIONE VISIVA';
  d.checklist.forEach((it,i)=>{
    const rh=it.nota?10:6.5;
    doc.setFillColor(i%2?248:255,i%2?249:255,i%2?252:255);doc.rect(10,y,190,rh,'F');doc.setDrawColor(225,230,242);doc.rect(10,y,190,rh,'S');
    doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(70,70,70);doc.text(mLbl,14,y+4.2);
    doc.text(it.label.length>48?it.label.substring(0,48)+'…':it.label,55,y+4.2);
    doc.setFont('helvetica','bold');const ec=it.esito==='POSITIVO'?[0,140,60]:it.esito==='ANOMALIA'?[200,80,0]:[100,100,100];
    doc.setTextColor(...ec);doc.text(it.esito,193,y+4.2,{align:'right'});
    if(it.nota){doc.setFont('helvetica','italic');doc.setFontSize(5.5);doc.setTextColor(160,100,0);doc.text('↳ '+it.nota,55,y+8.5);}
    y+=rh;
  });

  // Esito complessivo
  y+=3;doc.setFillColor(215,245,220);doc.rect(10,y,190,8,'F');doc.setDrawColor(0,160,70);doc.rect(10,y,190,8,'S');
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,100,40);
  doc.text('ESITO VERIFICA COMPLESSIVO',14,y+5.5);doc.text('POSITIVO',193,y+5.5,{align:'right'});y+=13;

  // Data/Firma
  doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(100,100,100);
  doc.text('DATA',30,y,{align:'center'});doc.text('FIRMA TECNICO',152,y,{align:'center'});
  y+=2;doc.setDrawColor(180,180,180);doc.line(14,y+7,56,y+7);doc.line(110,y+7,193,y+7);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(0,0,0);doc.text(d.data,35,y+5,{align:'center'});
  if(d.firmaDataURL){try{doc.addImage(d.firmaDataURL,'PNG',112,y-8,78,18);}catch(e){doc.text(d.tecnico||'—',152,y+5,{align:'center'});}}
  else doc.text(d.tecnico||'—',152,y+5,{align:'center'});

  // Footer
  const fy=H-20;doc.setFillColor(245,246,250);doc.rect(0,fy,W,20,'F');doc.setDrawColor(210,215,230);doc.line(0,fy,W,fy);
  doc.setFont('helvetica','italic');doc.setFontSize(5.5);doc.setTextColor(130,130,150);
  doc.text('La relazione finale differisce da un Certificato di conformità. I risultati si riferiscono esclusivamente all\'esemplare provato al momento del controllo.',W/2,fy+6,{align:'center',maxWidth:180});
  doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(100,100,120);
  doc.text('Doppio Vu Due S.R.L. · Via Quasimodo 12 · 95030 Tremestieri Etneo (CT) · Tel. 095 21 30 68 · info@doppiovudue.it · P.IVA: 02260980871',W/2,fy+13,{align:'center'});

  return doc.output('blob');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(d){return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

init();
</script>
